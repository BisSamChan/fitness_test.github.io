<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救助37期 - 全員成績原始紀錄</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { background-color: #f57c00; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; left: 0; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1600px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background-color: #fff3e0; position: sticky; top: 0; z-index: 10; }
        
        .name-col { font-weight: bold; background-color: #fff; position: sticky; left: 0; z-index: 5; border-right: 2px solid #f57c00; min-width: 80px; }
        .sub-head { font-size: 10px; color: #666; }
        
        input { width: 40px; padding: 4px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
        input:focus { border-color: #f57c00; outline: none; }

        .footer { padding: 20px; text-align: center; position: sticky; left: 0; }
        button { background-color: #f57c00; color: white; padding: 12px 40px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">救助37期體測 - 原始數據登錄表</div>
    
    <div style="padding: 10px; text-align: center; position: sticky; left: 0;">
        階段：<select id="termSelect"><option value="middle">期中測驗</option><option value="end">期末測驗</option></select>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2" class="name-col">姓名</th>
                <th colspan="3">立定跳遠 (cm)</th>
                <th colspan="3">後拋擲遠 (m)</th>
                <th rowspan="2">折返跑</th>
                <th colspan="3">菱形槓 (kg)</th>
                <th rowspan="2">懸吊屈體</th>
                <th rowspan="2">屈臂懸垂</th>
                <th colspan="2">負重行走</th>
                <th rowspan="2">1500m</th>
            </tr>
            <tr class="sub-head">
                <th>1</th><th>2</th><th>3</th>
                <th>1</th><th>2</th><th>3</th>
                <th>1</th><th>2</th><th>3</th>
                <th>1</th><th>2</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <div class="footer">
        <button type="button" id="submitBtn" onclick="submitData()">提交所有原始紀錄</button>
    </div>
</div>

<script>
    const students = ["沈晉嘉", "林胤昇", "邱立旻", "蔡承育", "李金道", "何亞駿", "陳耀鈞", "陳亮瑜", "高寶琳", "李健賓", "林敬庭", "陳致誠", "鄭光庭", "林冠庭", "蔡濟行", "梁錦鴻", "張力元", "張喆菡", "鍾明哲", "康景程", "胡倍誠", "劉羽宸", "王崇瑋", "周政霖", "王新仁", "謝季儒", "楊美玲", "黃建融", "洪子恩", "黎益動", "曾記評", "朱耀政", "陳秉軒", "謝益正", "劉芝廷"];

    const tbody = document.getElementById('studentTable');
    students.forEach((name, i) => {
        tbody.innerHTML += `
            <tr data-name="${name}">
                <td class="name-col">${name}</td>
                <td><input type="number" class="lj1"></td><td><input type="number" class="lj2"></td><td><input type="number" class="lj3"></td>
                <td><input type="number" step="0.1" class="bt1"></td><td><input type="number" step="0.1" class="bt2"></td><td><input type="number" step="0.1" class="bt3"></td>
                <td><input type="number" step="0.1" class="shuttle"></td>
                <td><input type="number" class="hb1"></td><td><input type="number" class="hb2"></td><td><input type="number" class="hb3"></td>
                <td><input type="number" class="lt"></td>
                <td><input type="number" step="0.1" class="ah"></td>
                <td><input type="number" step="0.1" class="cy1"></td><td><input type="number" step="0.1" class="cy2"></td>
                <td><input type="text" class="r1500"></td>
            </tr>`;
    });

    async function submitData() {
        const scriptUrl = 'YOUR_SCRIPT_URL_HERE';
        const term = document.getElementById('termSelect').value;
        const btn = document.getElementById('submitBtn');
        const rows = document.querySelectorAll('#studentTable tr');
        
        btn.disabled = true; btn.innerText = "上傳中...";

        for (let row of rows) {
            const name = row.getAttribute('data-name');
            // 只要有填寫姓名就抓取該行所有欄位
            const params = new URLSearchParams({
                term: term, name: name,
                lj1: row.querySelector('.lj1').value, lj2: row.querySelector('.lj2').value, lj3: row.querySelector('.lj3').value,
                bt1: row.querySelector('.bt1').value, bt2: row.querySelector('.bt2').value, bt3: row.querySelector('.bt3').value,
                shuttle: row.querySelector('.shuttle').value,
                hb1: row.querySelector('.hb1').value, hb2: row.querySelector('.hb2').value, hb3: row.querySelector('.hb3').value,
                lt: row.querySelector('.lt').value, ah: row.querySelector('.ah').value,
                cy1: row.querySelector('.cy1').value, cy2: row.querySelector('.cy2').value,
                r1500: row.querySelector('.r1500').value
            });

            // 只有當這行至少有一個成績填寫時才上傳
            if (Array.from(row.querySelectorAll('input')).some(i => i.value !== "")) {
                await fetch(scriptUrl, { method: 'POST', body: params, mode: 'no-cors' });
            }
        }
        alert("所有紀錄已同步至 Google Sheet！");
        btn.disabled = false; btn.innerText = "提交所有原始紀錄";
    }
</script>
</body>
</html>
